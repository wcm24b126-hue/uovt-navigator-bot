<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UoVT Navigator - Support Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern, subtle scrollbar styling */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #94a3b8;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #64748b;
        }

        /* Chat messages area - improved scrolling */
        #chat-messages {
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
            scroll-behavior: smooth;
            background: #f9fafb;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-animate {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen w-screen relative overflow-hidden font-sans">

    <button id="chat-toggle" class="fixed bottom-6 right-6 bg-[#1e3a8a] text-white p-4 rounded-full shadow-2xl hover:bg-blue-900 transition-all transform hover:scale-105 z-50 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
    </button>

    <div id="chat-window" class="fixed bottom-24 right-6 w-[22rem] sm:w-96 bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-200 z-50 hidden transition-all duration-300">
        
        <div class="bg-gradient-to-r from-[#1e3a8a] to-[#2563eb] text-white p-4 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <h3 class="font-bold text-md tracking-wide">UoVT Navigator</h3>
            </div>
            <button id="close-chat" class="text-white hover:text-gray-200 p-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div id="chat-messages" class="custom-scrollbar flex-1 bg-gray-50">
            <!-- Initial welcome message -->
            <div class="flex flex-col space-y-1 items-start message-animate">
                <div class="bg-white text-gray-800 p-3.5 rounded-2xl rounded-tl-sm shadow-sm max-w-[85%] border border-gray-100 text-sm">
                    Welcome to the University of Vocational Technology! 👋<br><br>How can I assist you?
                </div>
            </div>
        </div>

        <div id="typing-indicator" class="hidden px-4 pb-3 bg-gray-50 message-animate">
            <div class="bg-white border border-gray-100 shadow-sm rounded-2xl px-4 py-2 max-w-[fit-content] flex items-center space-x-1">
                <div class="w-1 h-1 bg-blue-600 rounded-full animate-bounce"></div>
                <div class="w-1 h-1 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-1 h-1 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>
        </div>

        <div class="border-t border-gray-100 p-3 bg-white flex items-end space-x-2">
            <textarea id="chat-input" rows="1" placeholder="Type your question..." class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 resize-none"></textarea>
            <button id="send-btn" class="bg-[#1e3a8a] text-white p-3 rounded-xl hover:bg-blue-800 h-[44px] flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR ACTUAL n8n / backend URL
        const N8N_WEBHOOK_URL = 'http://localhost:5678/webhook/6b195228-08af-4d8c-9a8b-e9b7363f7b9c/chat';

        const chatToggle = document.getElementById('chat-toggle');
        const chatWindow = document.getElementById('chat-window');
        const closeChat = document.getElementById('close-chat');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        let userHasScrolledUp = false;

        // Detect if user is reading older messages
        chatMessages.addEventListener('scroll', () => {
            const distanceFromBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight;
            userHasScrolledUp = distanceFromBottom > 80; // tolerance ~80px
        });

        chatToggle.addEventListener('click', () => {
            chatWindow.classList.remove('hidden');
            chatToggle.classList.add('hidden');
        });

        closeChat.addEventListener('click', () => {
            chatWindow.classList.add('hidden');
            chatToggle.classList.remove('hidden');
        });

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col space-y-1 message-animate ${sender === 'user' ? 'items-end' : 'items-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `p-3.5 rounded-2xl shadow-sm max-w-[85%] text-sm border leading-relaxed ${
                sender === 'user' 
                    ? 'bg-[#1e3a8a] text-white rounded-tr-sm' 
                    : 'bg-white text-gray-800 rounded-tl-sm border-gray-100'
            }`;
            
            bubble.innerText = text;
            msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv);

            // Auto-scroll only if user is already near the bottom
            if (!userHasScrolledUp) {
                requestAnimationFrame(() => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
            }
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            chatInput.value = '';
            
            typingIndicator.classList.remove('hidden');
            
            // Force scroll to bottom right after user sends message
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
                userHasScrolledUp = false;
            });

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: text, sessionId: 'uovt-student' })
                });

                if (!response.ok) throw new Error('Server error');

                const data = await response.json();
                typingIndicator.classList.add('hidden');
                appendMessage(data.output || "I'm not sure how to answer that.", 'bot');
            } catch (error) {
                typingIndicator.classList.add('hidden');
                appendMessage("⚠️ Sorry, something went wrong. Please try again.", 'bot');
                console.error(error);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Optional: auto-resize textarea
        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
